<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClientPing AI Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; background:#f4f6fb; }

.sidebar {
  width:220px; background:#1e3a8a; color:white; height:100vh; padding:20px;
}

.sidebar button {
  width:100%; margin-top:10px; padding:10px;
  border:none; background:white; color:#1e3a8a; border-radius:6px;
}

.main { flex:1; padding:20px; }

.card {
  background:white; padding:15px; margin-bottom:15px;
  border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input, button {
  width:100%; padding:10px; margin:5px 0;
  border-radius:6px; border:1px solid #ccc;
}

button { background:#1e3a8a; color:white; border:none; cursor:pointer; }

.hidden { display:none; }

.client { border-bottom:1px solid #eee; padding:10px 0; }

.badge {
  display:inline-block; padding:5px 10px;
  background:white; color:#1e3a8a; border-radius:5px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen" style="width:100%; padding:50px;">
  <div class="card" style="max-width:400px; margin:auto;">
    <h2>ClientPing AI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden" style="display:flex; width:100%;">

<div class="sidebar">
  <h2>ClientPing AI</h2>
  <div id="planBadge" class="badge">Free</div>

  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('clients')">Clients</button>
  <button onclick="showSection('add')">Add Client</button>
  <button onclick="upgradePlan()">Upgrade Pro</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="dashboardSection" class="card">
  <h3>Dashboard</h3>
  <p>Total Clients: <span id="clientCount">0</span></p>
  <p>Plan: <span id="currentPlan">Free</span></p>
</div>

<div id="clientsSection" class="card hidden">
  <h3>Clients</h3>
  <div id="clientList"></div>
</div>

<div id="addSection" class="card hidden">
  <h3>Add Client</h3>
  <input id="clientName" placeholder="Name">
  <input id="clientPhone" placeholder="Phone">
  <button onclick="addClient()">Add</button>
</div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://aeprgqutctiiwdmnsyxv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlcHJncXV0Y3RpaXdkbW5zeXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzIzOTYsImV4cCI6MjA5MDIwODM5Nn0.6_n1umaY8L8JjrchLvq_tmEW9lGxa4abl5sfAT3Mlvc"
);

const OPENAI_API_KEY = "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";
const RAZORPAY_KEY = "YOUR_RAZORPAY_KEY";

let USER_PLAN = "Free";
let currentUserId = null;

/* ================= AUTH ================= */

async function signup() {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  if (error) alert(error.message);
  else alert("Signup success");
}

async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) return alert(error.message);

  currentUserId = data.user.id;

  await loadProfile(currentUserId);

  showApp();
  loadClients();
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* ================= PROFILE ================= */

async function loadProfile(userId) {
  let { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .single();

  USER_PLAN = data?.plan || "Free";

  currentUserId = userId;

  document.getElementById("currentPlan").innerText = USER_PLAN;
  document.getElementById("planBadge").innerText = USER_PLAN;
}

/* ================= UI ================= */

function showApp() {
  authScreen.classList.add("hidden");
  appScreen.classList.remove("hidden");
}

function showSection(section) {
  dashboardSection.classList.add("hidden");
  clientsSection.classList.add("hidden");
  addSection.classList.add("hidden");

  if(section==="dashboard") dashboardSection.classList.remove("hidden");
  if(section==="clients") clientsSection.classList.remove("hidden");
  if(section==="add") addSection.classList.remove("hidden");
}

/* ================= PLAN LIMIT ================= */

function canAddClient(count) {
  if (USER_PLAN === "Pro") return true;
  return count < 5;
}

/* ================= CLIENTS ================= */

async function getClientCount() {
  const { count } = await supabase
    .from("clients")
    .select("*", { count:"exact", head:true })
    .eq("user_id", currentUserId);

  clientCount.innerText = count || 0;
  return count || 0;
}

async function addClient() {
  const count = await getClientCount();

  if (!canAddClient(count)) {
    alert("Upgrade to Pro to add more clients");
    return;
  }

  await supabase.from("clients").insert([{
    name: clientName.value,
    phone: clientPhone.value,
    user_id: currentUserId
  }]);

  loadClients();
}

async function loadClients() {
  const { data } = await supabase
    .from("clients")
    .select("*")
    .eq("user_id", currentUserId);

  const list = document.getElementById("clientList");
  list.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "client";

    div.innerHTML = `
      <b>${c.name}</b><br/>
      ${c.phone}<br/>
      <button onclick="generateAI('${c.id}','${c.name}')">AI Msg</button>
      <button onclick="sendWhatsApp('${c.phone}')">WhatsApp</button>
      <button onclick="deleteClient('${c.id}')">Delete</button>
      <div id="msg_${c.id}"></div>
    `;

    list.appendChild(div);
  });

  getClientCount();
}

async function deleteClient(id) {
  await supabase.from("clients").delete().eq("id", id);
  loadClients();
}

/* ================= AI ================= */

async function generateAI(clientId, name) {
  let msg = "Hello " + name;

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+OPENAI_API_KEY
      },
      body: JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          { role:"system", content:"Write short WhatsApp follow-ups" },
          { role:"user", content:`Message for ${name}` }
        ]
      })
    });

    const data = await res.json();
    msg = data.choices[0].message.content;

  } catch(e){}

  document.getElementById("msg_"+clientId).innerText = msg;

  await supabase.from("messages").insert([{
    user_id: currentUserId,
    client_id: clientId,
    message: msg
  }]);
}

/* ================= WHATSAPP ================= */

function sendWhatsApp(phone) {
  const url = `https://wa.me/${phone}?text=${encodeURIComponent("Hello from ClientPing AI 👋")}`;
  window.open(url,"_blank");
}

/* ================= RAZORPAY ================= */

function upgradePlan() {
  const options = {
    key: RAZORPAY_KEY,
    amount: 49900,
    currency: "INR",
    name: "ClientPing AI Pro",
    handler: async function () {

      await supabase
        .from("profiles")
        .update({ plan: "Pro" })
        .eq("id", currentUserId);

      alert("Upgraded to Pro 🚀");
      location.reload();
    }
  };

  new Razorpay(options).open();
}

/* ================= SESSION ================= */

supabase.auth.onAuthStateChange((event, session)=>{
  if(session){
    currentUserId = session.user.id;
    loadProfile(currentUserId);
    showApp();
    loadClients();
  }
});

</script>

</body>
</html>
