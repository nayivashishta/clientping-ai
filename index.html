<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClientPing AI - Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
  }
  /* Sidebar */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 70px;
    height: 100%;
    background: #5a67d8;
    display: flex; flex-direction: column; align-items: center; padding-top: 20px;
  }
  #sidebar i {
    font-size: 24px; color: #fff;
    margin: 20px 0;
    cursor: pointer;
  }
  #sidebar i.active {
    color: #ffd700;
  }
  /* Top bar */
  #topbar {
    margin-left: 70px;
    padding: 10px 20px;
    background: #764ba2;
    color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  /* Main content */
  #main {
    margin-left: 70px;
    padding: 20px;
  }
  .card {
    background: #fff; color: #333;
    border-radius: 12px;
    padding: 15px;
    margin: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn {
    background: #667eea; color: #fff;
    border: none; padding: 8px 12px;
    border-radius: 8px; cursor: pointer;
    margin-left: 5px;
  }
  .btn:hover { background: #5a67d8; }
  input { padding: 8px; border-radius: 8px; border: 1px solid #ccc; margin: 5px; width: 200px; }
  .modal {
    display:none; position: fixed; z-index:1000;
    left:0; top:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    justify-content:center; align-items:center;
  }
  .modal-content {
    background:#fff; padding:20px; border-radius:12px; width:400px; max-height:90%; overflow:auto;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <i class="fas fa-users active" title="Clients" onclick="showPage('clients')"></i>
  <i class="fas fa-envelope" title="AI Messages" onclick="showPage('ai')"></i>
  <i class="fas fa-bell" title="Reminders" onclick="showPage('reminders')"></i>
  <i class="fas fa-wallet" title="Payments" onclick="showPage('payments')"></i>
  <i class="fas fa-cog" title="Settings" onclick="showPage('settings')"></i>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div id="userInfo">Hello, User | Plan: <span id="planStatus">Free</span></div>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<!-- Main Content -->
<div id="main">
  <!-- Clients Page -->
  <div id="clientsPage">
    <h2>Clients</h2>
    <input id="clientName" placeholder="Name">
    <input id="clientContact" placeholder="Contact">
    <input id="reminderTime" type="datetime-local">
    <button class="btn" onclick="addClient()">Add Client</button>
    <div id="clientList"></div>
  </div>

  <!-- AI Messages Page -->
  <div id="aiPage" style="display:none;">
    <h2>AI Generated Messages</h2>
    <div id="aiMessage"></div>
    <button class="btn" onclick="generateMessage()">Generate Message</button>
    <button class="btn" onclick="sendWhatsApp()">Send WhatsApp</button>
  </div>

  <!-- Reminders Page -->
  <div id="remindersPage" style="display:none;">
    <h2>Smart Reminders</h2>
    <ul id="reminderList"></ul>
  </div>

  <!-- Payments Page -->
  <div id="paymentsPage" style="display:none;">
    <h2>Upgrade to Pro</h2>
    <p>Free: 5 Clients | Pro: Unlimited ₹299/month</p>
    <button class="btn" onclick="upgrade()">Pay via UPI</button>
  </div>

  <!-- Settings Page -->
  <div id="settingsPage" style="display:none;">
    <h2>Settings</h2>
    <button class="btn" onclick="toggleTheme()">Toggle Dark/Light</button>
  </div>
</div>

<!-- Modal for Client Details -->
<div id="clientModal" class="modal">
  <div class="modal-content">
    <h3 id="modalName"></h3>
    <p id="modalContact"></p>
    <p id="modalLastContact"></p>
    <textarea id="modalNotes" placeholder="Notes"></textarea><br>
    <button class="btn" onclick="generateMessage(true)">AI Message</button>
    <button class="btn" onclick="sendWhatsApp(true)">Send WhatsApp</button>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 Firebase Config - Replace with yours
const firebaseConfig = {
  apiKey: "AIzaSyA9gNoGmnrUF8GVi_4SxtTGJZUJNK3_iFg",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
  storageBucket:  "client-ping-ai.firebasestorage.app",
  messagingSenderId:  "150192483890",
  appId: "1:150192483890:web:1f1251a6b799f68c12962b",
  measurementId: "G-Z9C3P9BLY2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth State
onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById('userInfo').innerText = `Hello, ${user.email} | Plan: ${localStorage.getItem('plan')||'Free'}`;
    loadClients();
  } else {
    // Show login/signup modal or redirect
    alert("Please login/signup first");
  }
});

// Logout
function logout(){ signOut(auth); alert("Logged out"); }

// Page Navigation
function showPage(page){
  ['clients','ai','reminders','payments','settings'].forEach(p=>{
    document.getElementById(p+'Page').style.display = (p===page)?'block':'none';
  });
  document.querySelectorAll('#sidebar i').forEach(ic=>ic.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// Add Client
async function addClient(){
  let plan = localStorage.getItem("plan")||'free';
  let clients = JSON.parse(localStorage.getItem('clients')||'[]');
  if(plan!=='pro' && clients.length>=5){ alert("Free limit reached! Upgrade to Pro 🚀"); return; }

  const name = document.getElementById("clientName").value;
  const contact = document.getElementById("clientContact").value;
  const reminder = document.getElementById("reminderTime").value;

  const user = auth.currentUser;
  await addDoc(collection(db,'clients'),{
    name, contact, reminder, lastContact: new Date().toISOString(), followedUp:false, userId:user.uid
  });

  clients.push({name,contact,reminder,lastContact:new Date().toISOString(),followedUp:false,userId:user.uid});
  localStorage.setItem('clients',JSON.stringify(clients));
  loadClients();
}

// Load Clients
async function loadClients(){
  const list = document.getElementById('clientList');
  list.innerHTML='';
  const querySnapshot = await getDocs(collection(db,'clients'));
  querySnapshot.forEach(doc=>{
    const c = doc.data();
    if(c.userId!==auth.currentUser.uid) return;
    const card = document.createElement('div'); card.className='card';
    card.innerHTML=`<div>${c.name} - ${c.contact}</div>
      <div>
      <button class="btn" onclick="openModal('${c.name}','${c.contact}','${c.lastContact}')">Details</button>
      </div>`;
    list.appendChild(card);
  });
}

// Client Modal
function openModal(name,contact,last){
  document.getElementById('modalName').innerText=name;
  document.getElementById('modalContact').innerText='Contact: '+contact;
  document.getElementById('modalLastContact').innerText='Last Contact: '+last;
  document.getElementById('clientModal').style.display='flex';
}
function closeModal(){ document.getElementById('clientModal').style.display='none'; }

// AI Messages
function generateMessage(forModal=false){
  let clients = JSON.parse(localStorage.getItem('clients')||'[]');
  if(clients.length===0){ alert("No clients"); return; }
  const client = clients[clients.length-1];
  const message = `Hi ${client.name}, just checking in! Need any help? 😊`;
  if(forModal){ alert("AI Message: "+message); return; }
  document.getElementById('aiMessage').innerText=message;
}

// WhatsApp Send
function sendWhatsApp(forModal=false){
  let clients = JSON.parse(localStorage.getItem('clients')||'[]');
  if(clients.length===0){ alert("No clients"); return; }
  const client = clients[clients.length-1];
  const phone = client.contact;
  const msg = document.getElementById('aiMessage').innerText||`Hi ${client.name}, just checking in!`;
  if(forModal){ window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank'); return; }
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

// Smart Reminders
setInterval(()=>{
  let clients = JSON.parse(localStorage.getItem('clients')||'[]');
  const now = new Date().toISOString();
  const remList = document.getElementById('reminderList'); remList.innerHTML='';
  clients.forEach(c=>{
    if(!c.reminder) return;
    const li = document.createElement('li');
    li.innerText=`${c.name}: ${c.reminder} ${c.reminder<=now?'⏰ Overdue':'🕒 Upcoming'}`;
    remList.appendChild(li);
  });
},5000);

// Upgrade / Payments
function upgrade(){
  alert("Redirecting to UPI payment...");
  const upiID='YOUR_UPI_ID@upi';
  window.open(`upi://pay?pa=${upiID}&pn=ClientPingPro&am=299&cu=INR`,'_blank');
}

// Theme Toggle
function toggleTheme(){
  document.body.style.background=document.body.style.background.includes('#667eea')?'#1e1e2f':'linear-gradient(135deg, #667eea, #764ba2)';
}

</script>
</body>
</html>
