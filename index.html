<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
  body {
    font-family: Arial;
    background: #f8fafc;
    color: #0f172a;
    text-align: center;
    padding: 20px;
  }

  h2 {
    color: #1e3a8a;
  }

  input {
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #94a3b8;
    background: #ffffff;
    color: #0f172a;
    width: 220px;
  }
  input[type="datetime-local"] {
    color: #0f172a;
  }
  input:focus {
    outline: none;
    border: 1px solid #1e3a8a;
    box-shadow: 0 0 5px rgba(30,58,138,0.3);
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    background: #1e3a8a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2563eb;
  }

  .card {
    background: white;
    padding: 15px;
    margin: 15px auto;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 260px;
  }

  .clientCard {
    background: #e0f2fe;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    color: #0f172a;
  }
    #dashboard { display:none; }
  </style>
</head>
<body>

<div id="authBox">
  <h2>🔥 ClientPing AI</h2>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<div id="dashboard">
  <h2>🚀 Dashboard</h2>
  <button onclick="logout()">Logout</button>
  <button onclick="upgrade()">Upgrade to Pro 🚀</button>
  <button onclick="payNow()">Upgrade to Pro 💰</button>

  <div class="card">
  <h3>Add Client</h3>

  <p>Name</p>
  <input id="clientName" placeholder="Enter Name">

  <p>Phone</p>
  <input id="clientPhone" placeholder="Enter Phone">

  <p>⏰ Reminder</p>
  <input id="reminderTime" type="datetime-local" placeholder="Select Date & Time">

  <br>
  <button onclick="addClient()">Add</button>
  </div>

  <div class="card">
    <h3>Clients</h3>
    <div id="clientList"></div>
  </div>

  <div class="card">
    <h3>AI Message</h3>
    <button onclick="generateMessage()">Generate</button>
    <p id="aiMessage"></p>
  </div>
</div>

<!-- ✅ Firebase CDN (NO MODULE = NO ERROR) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>

// 
const firebaseConfig = {
  apiKey: "AIzaSyA9gNoGmnrUF8GVi_4SxtTGJZUJNK3_iFg",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
  storageBucket: "client-ping-ai.firebasestorage.app",
  messagingSenderId: "150192483890",
  appId: "1:150192483890:web:1f1251a6b799f68c12962b",
  measurementId: "G-Z9C3P9BLY2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let clientsData = [];

function isProUser() {
  return localStorage.getItem("plan") === "pro";
  }

let userPlan = localStorage.getItem("plan") || "free";
  
// AUTH
function signup() {
  firebase.auth().createUserWithEmailAndPassword(email.value, password.value)
    .then(() => {
      status.innerText = "Signup Successful";
    })
    .catch(e => status.innerText = e.message);
}

function login() {
  firebase.auth().signInWithEmailAndPassword(email.value, password.value)
    .then(() => {
      status.innerText = "Login Successful";

      document.getElementById("authBox").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      loadClients();
    })
    .catch(e => status.innerText = e.message);
}

function logout() {
  firebase.auth().signOut().then(() => {
    dashboard.style.display = "none";
    authBox.style.display = "block";
  });
}

// CLIENT SYSTEM
function addClient() {
  const user = firebase.auth().currentUser;

  if (!user) {
    alert("Login karo pehle");
    return;
  }

  if (!isProUser() && clientsData.length >= 3) {
  alert("Free plan me sirf 3 clients allowed 😢 Upgrade karo!");
  return;
  }
  db.collection("clients").add({
    uid: user.uid,
    name: clientName.value,
    phone: clientPhone.value,
    reminder: reminderTime.value
  })
  .then(() => {
    loadClients();
  });
}
  
function loadClients() {
  const user = firebase.auth().currentUser;

  if (!user) return;

  clientList.innerHTML = "";
  clientsData = [];

  db.collection("clients")
    .where("uid", "==", user.uid)
    .get()
    .then((snapshot) => {
      snapshot.forEach((doc, index) => {
        let c = doc.data();
        clientsData[index] = c;
        c.id = doc.id;

        clientList.innerHTML += `
          <div class="clientCard">
            <b>${c.name}</b> - ${c.phone}<br>
            ⏰ Reminder: ${c.reminder || "Not set"}<br><br>

            <button onclick="generateClientMessage('${c.name}', ${index})">Generate Msg</button>
            <button onclick="sendWhatsApp(${index})">Send</button>
            <button onclick="deleteClient(${index})" style="background:red;">Delete</button>

            <p id="msg-${index}"></p>
          </div>
        `;
      });
    });
}
// AI MESSAGE
function generateMessage() {
  let messages = [
    "Hello! Just checking in 😊",
    "Reminder for pending payment 💰",
    "Hope you're doing well!"
  ];

  aiMessage.innerText = messages[Math.floor(Math.random()*messages.length)];
}
  function generateClientMessage(name, index) {
  let messages = [
    `Hi ${name}, just checking in 😊`,
    `Hello ${name}, reminder for pending work 💰`,
    `Hey ${name}, hope you're doing well!`
  ];

  let msg = messages[Math.floor(Math.random()*messages.length)];

  document.getElementById(`msg-${index}`).innerText = msg;
  }
function deleteClient(index) {
  let id = clientsData[index].id;

  db.collection("clients").doc(id).delete()
    .then(() => {
      alert("Client deleted ✅");
      loadClients();
    });
}
// WHATSAPP
function sendWhatsApp(index) {
  let msg = document.getElementById(`msg-${index}`).innerText;

  if (!msg) {
    alert("Pehle message generate karo");
    return;
  }

  let phone = clientsData[index].phone;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

  function payNow() {
  var options = {
    key: "rzp_test_123456789", // 👈 apna Razorpay key dalna
    amount: 49900, // ₹499
    currency: "INR",
    name: "ClientPing AI",
    description: "Pro Upgrade",
    handler: function (response) {
      alert("Payment Successful 🎉");

      localStorage.setItem("plan", "pro");
      location.reload();
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
  }
  
function upgrade() {
  localStorage.setItem("plan", "pro");
  alert("Pro plan activated 🚀");
}
  
// 🔥 REMINDER SYSTEM
setInterval(() => {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  let now = new Date().toISOString().slice(0,16);

  clients.forEach((c) => {
    if (c.reminder && c.reminder === now) {
      let msg = `Hi ${c.name}, just checking in 😊`;

      window.open(`https://wa.me/${c.phone}?text=${encodeURIComponent(msg)}`);
    }
  });
}, 60000);
</script>

</body>
</html>
