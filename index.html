<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🚀 ClientPing AI</h1>

<!-- AUTH SECTION -->
<div id="auth">
  <h2>Signup</h2>
  <input id="email" placeholder="Enter Email"><br><br>
  <input id="password" type="password" placeholder="Enter Password"><br><br>
  <button onclick="signup()">Signup</button>

  <h2>Login</h2>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <h2>Welcome to Dashboard 🚀</h2>
  <p>Your app is working!</p>
  <button onclick="logout()">Logout</button>
</div>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
  storageBucket: "client-ping-ai.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

// ✅ SIGNUP
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("status").innerText = "Signup Successful 🎉";
    })
    .catch((error) => {
      document.getElementById("status").innerText = error.message;
    });
};

// ✅ LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("status").innerText = "Login Successful 😎";
    })
    .catch((error) => {
      document.getElementById("status").innerText = error.message;
    });
};

// ✅ LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    document.getElementById("status").innerText = "Logged out 👋";
  });
};

</script>

</body>
</html>
