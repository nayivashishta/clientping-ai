<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    input, button { padding:10px; margin:5px; border-radius:8px; border:none; }
    button { background:#2563eb; color:white; cursor:pointer; }
    #dashboard { display:none; }
    .card { background:#1e293b; padding:15px; margin:10px; border-radius:10px; }
  </style>
</head>
<body>

<div id="authBox">
  <h2>ClientPing AI 🔥</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <p id="status"></p>
</div>

<div id="dashboard">
  <h2>Welcome 🚀</h2>
  <button onclick="logout()">Logout</button>

  <div class="card">
    <h3>Add Client</h3>
    <input id="clientName" placeholder="Client Name">
    <input id="clientPhone" placeholder="Phone">
    <button onclick="addClient()">Add</button>
  </div>

  <div class="card">
    <h3>Clients</h3>
    <div id="clientList"></div>
  </div>

  <div class="card">
    <h3>AI Message</h3>
    <button onclick="generateMessage()">Generate</button>
    <p id="aiMessage"></p>
  </div>

  <div class="card">
    <h3>Plan</h3>
    <p id="plan">Free Plan</p>
    <button onclick="upgrade()">Upgrade (Demo)</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyA9gNoGmnrUF8GVi_4SxtTGJZUJNK3_iFg",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// AUTH
window.signup = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => status.innerText = "Signup Success")
    .catch(e => status.innerText = e.message);
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      status.innerText = "Login Success";
      authBox.style.display = "none";
      dashboard.style.display = "block";
      loadClients();
    })
    .catch(e => status.innerText = e.message);
};

window.logout = function () {
  signOut(auth).then(() => {
    dashboard.style.display = "none";
    authBox.style.display = "block";
  });
};

// CLIENT SYSTEM
window.addClient = function () {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  clients.push({
    name: clientName.value,
    phone: clientPhone.value
  });

  localStorage.setItem("clients", JSON.stringify(clients));
  loadClients();
};

function loadClients() {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  clientList.innerHTML = "";

  clients.forEach(c => {
    clientList.innerHTML += `
      <p>${c.name} - ${c.phone}
      <button onclick="sendWhatsApp('${c.phone}')">Send</button>
      </p>`;
  });
}

// AI MESSAGE
window.generateMessage = function () {
  let messages = [
    "Hello! Just checking in 😊",
    "Reminder for pending payment 💰",
    "Hope you're doing well!"
  ];

  let msg = messages[Math.floor(Math.random()*messages.length)];
  aiMessage.innerText = msg;
};

// WHATSAPP
window.sendWhatsApp = function (phone) {
  let msg = document.getElementById("aiMessage").innerText;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
};

// PLAN
window.upgrade = function () {
  plan.innerText = "Pro Plan Activated 🚀";
};

</script>

</body>
</html>
