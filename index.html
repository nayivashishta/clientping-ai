<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🚀 ClientPing AI</h1>

<!-- AUTH SECTION -->
<div id="auth">
  <h2>Signup</h2>
  <input id="email" placeholder="Enter Email"><br><br>
  <input id="password" type="password" placeholder="Enter Password"><br><br>
  <button onclick="signup()">Signup</button>

  <h2>Login</h2>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <h2>Welcome to Dashboard 🚀</h2>
  <p>Your app is working!</p>
  <button onclick="logout()">Logout</button>
</div>
  <h3>Add Client</h3>
  <input id="reminderTime" type="datetime-local"><br><br>
<input id="clientName" placeholder="Client Name"><br><br>
<input id="clientContact" placeholder="Contact"><br><br>
<button onclick="addClient()">Add Client</button>

<h3>Your Clients</h3>
<ul id="clientList"></ul>
<button onclick="generateMessage()">Generate Follow-up Message</button>

<p id="aiMessage"></p>
<p id="status"></p>

<script type="module">
  window.addClient = function () {
  const name = document.getElementById("clientName").value;
  const contact = document.getElementById("clientContact").value;

  const reminder = document.getElementById("reminderTime").value;

const client = { name, contact, reminder };

  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  clients.push(client);

  localStorage.setItem("clients", JSON.stringify(clients));

  loadClients();
};

function loadClients() {
  const list = document.getElementById("clientList");
  list.innerHTML = "";

  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  clients.forEach(c => {
    const li = document.createElement("li");
    li.innerText = c.name + " - " + c.contact;
    list.appendChild(li);
  });
}
setInterval(() => {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];
  const now = new Date().toISOString();

  clients.forEach(c => {
    if (c.reminder && c.reminder <= now && !c.alerted) {
      alert("Reminder for " + c.name);
      c.alerted = true;
    }
  });

  localStorage.setItem("clients", JSON.stringify(clients));
}, 5000);
  window.generateMessage = function () {
  let clients = JSON.parse(localStorage.getItem("clients")) || [];

  if (clients.length === 0) {
    document.getElementById("aiMessage").innerText = "No clients found";
    return;
  }

  // Last added client
  const client = clients[clients.length - 1];

  const message = `Hi ${client.name}, just checking in! Let me know if you need any help.`;

  document.getElementById("aiMessage").innerText = message;
};
  
// Page load pe clients show
loadClients();

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA9gNoGmnrUF8GVi_4SxtTGJZUJNK3_iFg",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
  storageBucket:  "client-ping-ai.firebasestorage.app",
  messagingSenderId:  "150192483890",
  appId: "1:150192483890:web:1f1251a6b799f68c12962b",
  measurementId: "G-Z9C3P9BLY2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

// ✅ SIGNUP
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("status").innerText = "Signup Successful 🎉";
    })
    .catch((error) => {
      document.getElementById("status").innerText = error.message;
    });
};

// ✅ LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("status").innerText = "Login Successful 😎";
    })
    .catch((error) => {
      document.getElementById("status").innerText = error.message;
    });
};

// ✅ LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    document.getElementById("status").innerText = "Logged out 👋";
  });
};
  
</script>

</body>
</html>
