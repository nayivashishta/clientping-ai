<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
  body {
    font-family: Arial;
    background: #f8fafc;
    color: #0f172a;
    text-align: center;
    padding: 20px;
  }

  h2 { color: #1e3a8a; }

  input {
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #94a3b8;
    width: 220px;
  }

  button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    background: #1e3a8a;
    color: white;
    cursor: pointer;
  }

  .card {
    background: white;
    padding: 15px;
    margin: 15px auto;
    border-radius: 12px;
    width: 260px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .clientCard {
    background: #e0f2fe;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
  }

  #dashboard { display:none; }
  </style>
</head>

<body>

<div id="authBox">
  <h2>🔥 ClientPing AI</h2>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<div id="dashboard">
  <h2>🚀 Dashboard</h2>

  <button onclick="logout()">Logout</button>
  <button onclick="upgrade()">Upgrade to Pro 🚀</button>
  <button onclick="payNow()">Upgrade to Pro 💰</button>

  <div class="card">
    <h3>Add Client</h3>

    <input id="clientName" placeholder="Enter Name"><br>
    <input id="clientPhone" placeholder="Enter Phone"><br>
    <input id="reminderTime" type="datetime-local"><br>

    <button onclick="addClient()">Add</button>
  </div>

  <div class="card">
    <h3>Clients</h3>
    <div id="clientList"></div>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let clientsData = [];

/* ================= AUTH ================= */

function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      status.innerText = "Signup Successful";
    })
    .catch(e => status.innerText = e.message);
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      status.innerText = "Login Successful";
    })
    .catch(e => status.innerText = e.message);
}

function logout() {
  auth.signOut();
}

/* ================= AUTH STATE ================= */

auth.onAuthStateChanged((user) => {
  if (user) {
    document.getElementById("authBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadClients();
  } else {
    document.getElementById("authBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

/* ================= PLAN ================= */

function isProUser() {
  return localStorage.getItem("plan") === "pro";
}

/* ================= CLIENT ================= */

function addClient() {
  const user = auth.currentUser;

  if (!user) {
    alert("Login karo pehle");
    return;
  }

  db.collection("clients")
    .where("uid", "==", user.uid)
    .get()
    .then(snapshot => {

      if (!isProUser() && snapshot.size >= 3) {
        alert("Free plan me sirf 3 clients allowed 😢 Upgrade karo!");
        return;
      }

      db.collection("clients").add({
        uid: user.uid,
        name: clientName.value,
        phone: clientPhone.value,
        reminder: reminderTime.value
      }).then(() => loadClients());

    });
}

function loadClients() {
  const user = auth.currentUser;
  if (!user) return;

  clientList.innerHTML = "";
  clientsData = [];

  db.collection("clients")
    .where("uid", "==", user.uid)
    .get()
    .then(snapshot => {

      snapshot.forEach((doc, index) => {
        let c = doc.data();
        c.id = doc.id;
        clientsData[index] = c;

        clientList.innerHTML += `
          <div class="clientCard">
            <b>${c.name}</b> - ${c.phone}<br>
            ⏰ ${c.reminder || "No reminder"}<br><br>

            <button onclick="generateClientMessage('${c.name}', ${index})">Generate Msg</button>
            <button onclick="sendWhatsApp(${index})">Send</button>
            <button onclick="deleteClient(${index})" style="background:red;">Delete</button>

            <p id="msg-${index}"></p>
          </div>
        `;
      });

    });
}

/* ================= DELETE ================= */

function deleteClient(index) {
  let id = clientsData[index].id;

  db.collection("clients").doc(id).delete()
    .then(() => loadClients());
}

/* ================= WHATSAPP ================= */

function sendWhatsApp(index) {
  let msg = document.getElementById(`msg-${index}`).innerText;

  if (!msg) {
    alert("Pehle message generate karo");
    return;
  }

  let phone = clientsData[index].phone;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

/* ================= AI MESSAGE ================= */

function generateClientMessage(name, index) {
  let messages = [
    `Hi ${name}, just checking in 😊`,
    `Hello ${name}, reminder for pending work 💰`,
    `Hey ${name}, hope you're doing well!`
  ];

  let msg = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById(`msg-${index}`).innerText = msg;
}

/* ================= PAYMENT ================= */

function payNow() {
  var options = {
    key: "rzp_test_123456789",
    amount: 49900,
    currency: "INR",
    name: "ClientPing AI",
    description: "Pro Upgrade",
    handler: function () {
      localStorage.setItem("plan", "pro");
      alert("Pro Activated 🚀");
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

function upgrade() {
  localStorage.setItem("plan", "pro");
  alert("Pro Activated 🚀");
}

/* ================= REMINDER ================= */

setInterval(() => {
  let now = new Date().toISOString().slice(0,16);

  let user = auth.currentUser;
  if (!user) return;

  db.collection("clients")
    .where("uid", "==", user.uid)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        let c = doc.data();

        if (c.reminder === now) {
          window.open(`https://wa.me/${c.phone}?text=${encodeURIComponent("Reminder for your task")}`);
        }
      });
    });

}, 60000);

</script>

</body>
</html>
