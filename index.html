<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClientPing AI</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {margin:0;font-family:Arial;background:#f4f6fb;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;}
button{background:#0a1f44;color:#fff;border:none;}
.hidden{display:none;}
.client{border:1px solid #ddd;padding:10px;border-radius:10px;margin-top:10px;}
.badge{background:#0a1f44;color:#fff;padding:5px 10px;border-radius:20px;}
</style>
</head>

<body>

<div class="container">

<div id="authSection" class="card">
<h2>ClientPing AI</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div id="appSection" class="hidden">

<div class="card">
<h2>Dashboard</h2>
<span id="planBadge" class="badge">FREE</span>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Add Client</h3>
<input id="clientName" placeholder="Name">
<input id="clientPhone" placeholder="Phone">
<input id="clientEmail" placeholder="Email">
<input id="reminderTime" type="datetime-local">
<button onclick="addClient()">Add</button>
<p id="planInfo"></p>
<button onclick="upgradePlan()">Upgrade</button>
</div>

<div class="card">
<h3>Clients</h3>
<div id="clientList"></div>
</div>

</div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA9gNoGmnrUF8GVi_4SxtTGJZUJNK3_iFg",
  authDomain: "client-ping-ai.firebaseapp.com",
  projectId: "client-ping-ai",
  storageBucket: "client-ping-ai.firebasestorage.app",
  messagingSenderId: "150192483890",
  appId: "1:150192483890:web:1f1251a6b799f68c12962b",
  measurementId: "G-Z9C3P9BLY2"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;
let userPlan="free";

// AUTH
auth.onAuthStateChanged(async user=>{
if(user){
currentUser=user;
authSection.classList.add("hidden");
appSection.classList.remove("hidden");
await loadPlan();
loadClients();
setInterval(checkReminders,30000);
}else{
authSection.classList.remove("hidden");
appSection.classList.add("hidden");
}
});

// SIGNUP
function signup(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,pass)
.then(async res=>{
await db.collection("users").doc(res.user.uid).set({
plan:"free",
createdAt:new Date()
});
alert("Signup success");
})
.catch(e=>alert(e.message));
}

// LOGIN
function login(){
const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){ auth.signOut(); }

// PLAN
async function loadPlan(){
const doc=await db.collection("users").doc(currentUser.uid).get();
if(doc.exists){
userPlan=doc.data().plan;
}else{
await db.collection("users").doc(currentUser.uid).set({plan:"free"});
}
planBadge.innerText=userPlan.toUpperCase();
planInfo.innerText="Plan: "+userPlan;
}

// AI MESSAGE ENGINE 🔥
function generateSmartMessage(name, dueTime){

const now=new Date();
const due=new Date(dueTime);

const diff=(due-now)/(1000*60*60); // hours

if(diff > 24){
return `Hey ${name} 😊 Just a gentle reminder about the pending payment. Let me know if you need anything.`;
}
else if(diff > 2){
return `Hi ${name} 👋 Just checking in regarding the payment. Please update when possible.`;
}
else{
return `Hi ${name}, this is urgent ⚠️ Your payment is overdue. Kindly clear it today.`;
}

}

// ADD CLIENT
async function addClient(){

const name=clientName.value;
const phone=clientPhone.value;
const email=clientEmail.value;
const time=reminderTime.value;

if(!name||!phone||!email||!time){
alert("Fill all fields"); return;
}

const snap=await db.collection("clients")
.where("uid","==",currentUser.uid).get();

if(userPlan==="free" && snap.size>=3){
alert("Upgrade to Pro"); return;
}

const ref=await db.collection("clients").add({
uid:currentUser.uid,
name,
phone,
email,
createdAt:new Date()
});

await db.collection("reminders").add({
uid:currentUser.uid,
clientId:ref.id,
clientName:name,
phone,
scheduledTime:new Date(time).toISOString(),
status:"pending"
});

loadClients();
}

// LOAD CLIENTS
async function loadClients(){

clientList.innerHTML="";

const snap=await db.collection("clients")
.where("uid","==",currentUser.uid).get();

snap.forEach(doc=>{
const c=doc.data();

const msg=generateSmartMessage(c.name,new Date());

const div=document.createElement("div");
div.className="client";

div.innerHTML=`
<b>${c.name}</b><br>
${c.phone}<br>
${c.email}<br>
<p>${msg}</p>
<button onclick="sendWhatsApp('${c.phone}','${msg}')">WhatsApp</button>
<button onclick="deleteClient('${doc.id}')">Delete</button>
`;

clientList.appendChild(div);
});

}

// AUTO REMINDER
async function checkReminders(){

const now=new Date().toISOString();

const snap=await db.collection("reminders")
.where("uid","==",currentUser.uid)
.where("status","==","pending")
.get();

snap.forEach(async doc=>{
const r=doc.data();

if(r.scheduledTime<=now){

const msg=generateSmartMessage(r.clientName,r.scheduledTime);

window.open(`https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}`);

await db.collection("reminders").doc(doc.id)
.update({status:"sent"});
}
});

}

// DELETE
async function deleteClient(id){

const snap=await db.collection("reminders")
.where("clientId","==",id).get();

snap.forEach(async d=>{
await db.collection("reminders").doc(d.id).delete();
});

await db.collection("clients").doc(id).delete();

loadClients();
}

// WHATSAPP
function sendWhatsApp(phone,msg){
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// UPGRADE
function upgradePlan(){
alert("Payment Success (Demo)");
db.collection("users").doc(currentUser.uid)
.set({plan:"pro"});
loadPlan();
}

</script>
</body>
</html>
